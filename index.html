<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila do Victor</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#6a11cb,#2575fc);
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:750px;
max-width:90%;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#333;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#2575fc;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#1a5edb;
}

ul{
list-style:none;
padding:0;
margin-top:15px;
}

li{
background:#f3f3f3;
padding:12px;
margin-top:6px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

li:hover{
background:#e2e2e2;
}

textarea{
width:100%;
height:220px;
margin-top:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

.hidden{
display:none;
}

.voltar{
background:#777;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎒 Mochila do Victor</h1>

<div id="menu">

<input id="materiaInput" placeholder="Digite a matéria (ex: Português)">
<button onclick="adicionarMateria()">Adicionar</button>

<h3>📚 Minhas Matérias</h3>

<ul id="listaMaterias"></ul>

</div>

<div id="caderno" class="hidden">

<h2 id="tituloMateria"></h2>

<textarea id="textoMateria" placeholder="Escreva aqui a matéria que o professor passou na aula..."></textarea>

<br>

<button onclick="salvar()">Salvar</button>
<button class="voltar" onclick="voltar()">Voltar</button>

</div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materiasVictor")) || {};
let materiaAtual = "";

function atualizarLista(){

let lista = document.getElementById("listaMaterias");
lista.innerHTML="";

for(let materia in materias){

let li = document.createElement("li");

li.innerText = materia;

li.onclick = function(){
abrirMateria(materia);
};

lista.appendChild(li);

}

}

function adicionarMateria(){

let input = document.getElementById("materiaInput");
let nome = input.value;

if(nome === "") return;

materias[nome] = "";

salvarDados();

input.value="";

atualizarLista();

}

function abrirMateria(nome){

materiaAtual = nome;

document.getElementById("menu").classList.add("hidden");
document.getElementById("caderno").classList.remove("hidden");

document.getElementById("tituloMateria").innerText = "Caderno de " + nome;

document.getElementById("textoMateria").value = materias[nome];

}

function salvar(){

materias[materiaAtual] = document.getElementById("textoMateria").value;

salvarDados();

alert("Matéria salva!");

}

function voltar(){

document.getElementById("menu").classList.remove("hidden");
document.getElementById("caderno").classList.add("hidden");

}

function salvarDados(){

localStorage.setItem("materiasVictor", JSON.stringify(materias));

}

atualizarLista();

</script>

</body>
</html>
