<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila Escolar</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:700px;
max-width:90%;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
width:70%;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#4facfe;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#2d8cff;
}

ul{
list-style:none;
padding:0;
margin-top:15px;
}

li{
background:#f2f2f2;
padding:10px;
margin-top:5px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

li:hover{
background:#e0e0e0;
}

textarea{
width:100%;
height:200px;
margin-top:10px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
}

.voltar{
margin-top:10px;
background:#777;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>🎒 Mochila Escolar</h1>

<div id="menu">

<input id="materiaInput" placeholder="Digite o nome da matéria">

<button onclick="adicionarMateria()">Adicionar</button>

<h3>📚 Matérias</h3>

<ul id="lista"></ul>

</div>

<div id="caderno" class="hidden">

<h2 id="titulo"></h2>

<textarea id="texto" placeholder="Escreva aqui a matéria que o professor passou..."></textarea>

<br>

<button onclick="salvar()">Salvar</button>
<button class="voltar" onclick="voltar()">Voltar</button>

</div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || {};
let atual = "";

function atualizar(){

let lista = document.getElementById("lista");
lista.innerHTML="";

for(let m in materias){

let li = document.createElement("li");

li.innerText = m;

li.onclick = ()=>abrir(m);

lista.appendChild(li);

}

}

function adicionarMateria(){

let nome = document.getElementById("materiaInput").value;

if(nome=="") return;

materias[nome] = "";

salvarDados();

document.getElementById("materiaInput").value="";

atualizar();

}

function abrir(nome){

atual = nome;

document.getElementById("menu").classList.add("hidden");
document.getElementById("caderno").classList.remove("hidden");

document.getElementById("titulo").innerText="Caderno de "+nome;

document.getElementById("texto").value = materias[nome];

}

function salvar(){

materias[atual] = document.getElementById("texto").value;

salvarDados();

alert("Matéria salva!");

}

function voltar(){

document.getElementById("menu").classList.remove("hidden");
document.getElementById("caderno").classList.add("hidden");

}

function salvarDados(){

localStorage.setItem("materias",JSON.stringify(materias));

}

atualizar();

</script>

</body>
</html>
