<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila do Victor</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}

h1{
    color:#333;
}

#container{
    width:80%;
    margin:auto;
}

input, textarea, button{
    padding:10px;
    margin:5px;
}

.materia{
    background:white;
    padding:15px;
    margin:10px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.2);
}

textarea{
    width:90%;
    height:80px;
}
</style>

</head>

<body>

<h1>🎒 Mochila do Victor</h1>
<p>Seu caderno digital</p>

<div id="container">

<input type="text" id="nomeMateria" placeholder="Nome da matéria">
<button onclick="adicionarMateria()">Adicionar Matéria</button>

<div id="listaMaterias"></div>

</div>

<script>

function adicionarMateria(){

    let nome = document.getElementById("nomeMateria").value;

    if(nome == ""){
        alert("Digite o nome da matéria");
        return;
    }

    let div = document.createElement("div");
    div.className = "materia";

    div.innerHTML = `
        <h2>${nome}</h2>
        <textarea placeholder="Escreva suas anotações aqui..."></textarea><br>
        <button onclick="salvar(this)">Salvar</button>
    `;

    document.getElementById("listaMaterias").appendChild(div);

    document.getElementById("nomeMateria").value="";
}

function salvar(botao){
    alert("Anotação salva!");
}

</script>

</body>
</html>
