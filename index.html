<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Mochila do Victor</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:900px;
max-width:95%;
background:#1e293b;
border-radius:15px;
padding:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

header{
text-align:center;
margin-bottom:20px;
}

header h1{
font-size:28px;
}

header p{
color:#94a3b8;
font-size:14px;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
background:#38bdf8;
color:#0f172a;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.lista{
margin-top:20px;
}

.materia{
background:#334155;
padding:12px;
border-radius:8px;
margin-top:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.materia span{
cursor:pointer;
}

.remover{
background:#ef4444;
color:white;
padding:6px 10px;
border-radius:6px;
font-size:12px;
}

.remover:hover{
background:#dc2626;
}

textarea{
width:100%;
height:220px;
margin-top:15px;
border-radius:8px;
border:none;
padding:10px;
resize:none;
}

.voltar{
margin-top:10px;
background:#64748b;
color:white;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="app">

<header>
<h1>🎒 Mochila do Victor</h1>
<p>Organize suas matérias da escola</p>
</header>

<div id="home">

<input id="materiaInput" placeholder="Digite a matéria (ex: Matemática)">
<button onclick="addMateria()">Adicionar</button>

<div class="lista" id="listaMaterias"></div>

</div>

<div id="caderno" class="hidden">

<h2 id="titulo"></h2>

<textarea id="conteudo" placeholder="Escreva aqui a matéria da aula..."></textarea>

<br>

<button onclick="salvar()">Salvar</button>
<button class="voltar" onclick="voltar()">Voltar</button>

</div>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("mochilaVictor")) || {};
let atual = "";

function atualizar(){

let lista = document.getElementById("listaMaterias");
lista.innerHTML="";

for(let nome in materias){

let div = document.createElement("div");
div.className="materia";

let span = document.createElement("span");
span.innerText=nome;
span.onclick=()=>abrir(nome);

let btn = document.createElement("button");
btn.innerText="Excluir";
btn.className="remover";
btn.onclick=()=>remover(nome);

div.appendChild(span);
div.appendChild(btn);

lista.appendChild(div);

}

}

function addMateria(){

let input=document.getElementById("materiaInput");
let nome=input.value.trim();

if(nome==="") return;

materias[nome]="";

salvarDados();

input.value="";

atualizar();

}

function abrir(nome){

atual=nome;

document.getElementById("home").classList.add("hidden");
document.getElementById("caderno").classList.remove("hidden");

document.getElementById("titulo").innerText="📖 "+nome;

document.getElementById("conteudo").value=materias[nome];

}

function salvar(){

materias[atual]=document.getElementById("conteudo").value;

salvarDados();

alert("Matéria salva!");

}

function voltar(){

document.getElementById("home").classList.remove("hidden");
document.getElementById("caderno").classList.add("hidden");

}

function remover(nome){

if(confirm("Remover essa matéria?")){

delete materias[nome];

salvarDados();

atualizar();

}

}

function salvarDados(){

localStorage.setItem("mochilaVictor", JSON.stringify(materias));

}

atualizar();

</script>

</body>

</html>
