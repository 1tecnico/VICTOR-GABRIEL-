<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochila Digital Victor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    width: 900px;
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.top-section {
    display: flex;
    gap: 20px;
}

.form {
    flex: 1;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-add { background: #00c6ff; }
.btn-add:hover { background: #0072ff; }

.btn-solve { background: #28a745; margin-top: 15px; }
.btn-solve:hover { background: #1e7e34; }

.inventory {
    flex: 1;
    background: rgba(0,0,0,0.3);
    padding: 15px;
    border-radius: 10px;
    max-height: 300px;
    overflow-y: auto;
}

.item {
    background: rgba(255,255,255,0.2);
    padding: 8px;
    margin: 5px 0;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
}

.item button {
    background: red;
    width: auto;
    padding: 4px 8px;
}

.capacity-bar {
    margin-top: 15px;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    overflow: hidden;
    height: 25px;
}

.capacity-fill {
    height: 100%;
    width: 0%;
    background: limegreen;
    text-align: center;
    line-height: 25px;
    color: black;
    font-weight: bold;
}

.resultado {
    margin-top: 15px;
    background: rgba(0,0,0,0.4);
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎒 Mochila Digital Victor</h1>

    <label>Capacidade Máxima:</label>
    <input type="number" id="capacidade" placeholder="Ex: 50">

    <div class="top-section">
        <div class="form">
            <h3>Adicionar Item</h3>
            <input type="text" id="nome" placeholder="Nome do item">
            <input type="number" id="peso" placeholder="Peso">
            <input type="number" id="valor" placeholder="Valor">
            <button class="btn-add" onclick="adicionarItem()">Adicionar</button>
        </div>

        <div class="inventory">
            <h3>Inventário</h3>
            <div id="listaItens"></div>
        </div>
    </div>

    <div class="capacity-bar">
        <div class="capacity-fill" id="capacityFill">0%</div>
    </div>

    <button class="btn-solve" onclick="resolverMochila()">Calcular Melhor Combinação</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
let itens = [];

function adicionarItem() {
    const nome = document.getElementById("nome").value;
    const peso = parseInt(document.getElementById("peso").value);
    const valor = parseInt(document.getElementById("valor").value);

    if (!nome || isNaN(peso) || isNaN(valor)) {
        alert("Preencha corretamente!");
        return;
    }

    itens.push({ nome, peso, valor });
    atualizarLista();

    document.getElementById("nome").value = "";
    document.getElementById("peso").value = "";
    document.getElementById("valor").value = "";
}

function removerItem(index) {
    itens.splice(index, 1);
    atualizarLista();
}

function atualizarLista() {
    const lista = document.getElementById("listaItens");
    lista.innerHTML = "";

    let pesoTotal = 0;

    itens.forEach((item, index) => {
        pesoTotal += item.peso;

        lista.innerHTML += `
            <div class="item">
                ${item.nome} (P:${item.peso} V:${item.valor})
                <button onclick="removerItem(${index})">X</button>
            </div>
        `;
    });

    atualizarBarra(pesoTotal);
}

function atualizarBarra(pesoTotal) {
    const capacidade = parseInt(document.getElementById("capacidade").value) || 1;
    const porcentagem = Math.min((pesoTotal / capacidade) * 100, 100);

    const barra = document.getElementById("capacityFill");
    barra.style.width = porcentagem + "%";
    barra.innerText = Math.round(porcentagem) + "%";
}

function resolverMochila() {
    const capacidade = parseInt(document.getElementById("capacidade").value);
    if (isNaN(capacidade)) {
        alert("Informe a capacidade!");
        return;
    }

    const n = itens.length;
    let dp = Array(n + 1).fill().map(() => Array(capacidade + 1).fill(0));

    for (let i = 1; i <= n; i++) {
        for (let w = 0; w <= capacidade; w++) {
            if (itens[i - 1].peso <= w) {
                dp[i][w] = Math.max(
                    itens[i - 1].valor + dp[i - 1][w - itens[i - 1].peso],
                    dp[i - 1][w]
                );
            } else {
                dp[i][w] = dp[i - 1][w];
            }
        }
    }

    let w = capacidade;
    let escolhidos = [];

    for (let i = n; i > 0; i--) {
        if (dp[i][w] !== dp[i - 1][w]) {
            escolhidos.push(itens[i - 1]);
            w -= itens[i - 1].peso;
        }
    }

    document.getElementById("resultado").innerHTML = `
        <h3>Melhor Combinação</h3>
        <p><strong>Valor Máximo:</strong> ${dp[n][capacidade]}</p>
        <p><strong>Itens Selecionados:</strong></p>
        <ul>
            ${escolhidos.map(item =>
                `<li>${item.nome} (Peso: ${item.peso}, Valor: ${item.valor})</li>`
            ).join("")}
        </ul>
    `;
}
</script>

</body>
</html>
