<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila do Victor</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#2b6cff,#6fb3ff);
margin:0;
padding:0;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
text-align:center;
color:#2b6cff;
}

input{
padding:10px;
width:70%;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:5px;
cursor:pointer;
margin-left:5px;
}

.add{
background:#2b6cff;
color:white;
}

ul{
list-style:none;
padding:0;
}

li{
background:#f2f2f2;
padding:10px;
margin-top:10px;
border-radius:5px;
cursor:pointer;
}

li:hover{
background:#e0e0e0;
}

#caderno{
margin-top:20px;
display:none;
}

textarea{
width:100%;
height:200px;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
resize:none;
}

.salvar{
background:#28a745;
color:white;
margin-top:10px;
}

.voltar{
background:#777;
color:white;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎒 Mochila do Victor</h1>

<div id="materias">

<h3>Matérias</h3>

<input type="text" id="materiaInput" placeholder="Digite a matéria">
<button class="add" onclick="addMateria()">Adicionar</button>

<ul id="listaMaterias"></ul>

</div>

<div id="caderno">

<button class="voltar" onclick="voltar()">⬅ Voltar</button>

<h3 id="tituloMateria"></h3>

<textarea id="anotacao" placeholder="Escreva suas anotações aqui..."></textarea>

<button class="salvar" onclick="salvarAnotacao()">Salvar Anotação</button>

</div>

</div>

<script>

let materiaAtual = ""

function addMateria(){

let input = document.getElementById("materiaInput")
let nome = input.value.trim()

if(nome === ""){
alert("Digite a matéria")
return
}

let li = document.createElement("li")
li.textContent = nome

li.onclick = function(){
abrirMateria(nome)
}

document.getElementById("listaMaterias").appendChild(li)

input.value=""

}

function abrirMateria(nome){

materiaAtual = nome

document.getElementById("materias").style.display="none"
document.getElementById("caderno").style.display="block"

document.getElementById("tituloMateria").textContent="📚 "+nome

let texto = localStorage.getItem("anotacao_"+nome)

document.getElementById("anotacao").value = texto || ""

}

function salvarAnotacao(){

let texto = document.getElementById("anotacao").value

localStorage.setItem("anotacao_"+materiaAtual,texto)

alert("Anotação salva!")

}

function voltar(){

document.getElementById("materias").style.display="block"
document.getElementById("caderno").style.display="none"

}

</script>

</body>
</html>
