<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila de Victor</title>

<style>
body{
background:#1E90FF;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-bottom:20px;
}

input{
padding:8px;
border-radius:5px;
border:none;
}

button{
margin:5px;
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
}

.add-btn{
background:#32CD32;
color:white;
}

.del-btn{
background:#FF4500;
color:white;
}

.save-btn{
background:#FFD700;
color:black;
}

#materias{
list-style:none;
padding:0;
}

#materias li{
background:rgba(255,255,255,0.2);
margin:6px 0;
padding:10px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

#anotacoesTela{
display:none;
}

textarea{
width:90%;
height:250px;
margin-top:10px;
border-radius:6px;
border:none;
padding:10px;
font-size:16px;
}
</style>
</head>

<body>

<h1>Mochila de Victor</h1>

<div id="listaTela">

<input id="novaMateria" placeholder="Digite a matéria">

<button class="add-btn" onclick="adicionarMateria()">
Adicionar Matéria
</button>

<ul id="materias"></ul>

</div>

<div id="anotacoesTela">

<h2 id="tituloMateria"></h2>

<textarea id="areaAnotacoes" placeholder="Escreva suas anotações aqui..."></textarea>

<br>

<button class="save-btn" onclick="salvarAnotacoes()">Salvar Anotações</button>

<button onclick="voltar()">Voltar</button>

</div>

<script>

let materias = JSON.parse(localStorage.getItem("materias")) || [];

let materiaAtual = null;

function salvarDados(){
localStorage.setItem("materias",JSON.stringify(materias));
}

function renderizar(){

const ul=document.getElementById("materias");

ul.innerHTML="";

materias.forEach((m,index)=>{

const li=document.createElement("li");

const nome=document.createElement("span");
nome.textContent=m.nome;

nome.onclick=function(){
abrirMateria(index);
};

const btn=document.createElement("button");

btn.textContent="Excluir";
btn.className="del-btn";

btn.onclick=function(e){
e.stopPropagation();
materias.splice(index,1);
salvarDados();
renderizar();
};

li.appendChild(nome);
li.appendChild(btn);

ul.appendChild(li);

});

}

function adicionarMateria(){

const input=document.getElementById("novaMateria");

const nome=input.value.trim();

if(nome!=""){

materias.push({
nome:nome,
anotacoes:""
});

input.value="";

salvarDados();

renderizar();

}

}

function abrirMateria(index){

materiaAtual=index;

document.getElementById("listaTela").style.display="none";
document.getElementById("anotacoesTela").style.display="block";

document.getElementById("tituloMateria").textContent=materias[index].nome;

document.getElementById("areaAnotacoes").value=materias[index].anotacoes;

}

function salvarAnotacoes(){

if(materiaAtual!==null){

materias[materiaAtual].anotacoes=document.getElementById("areaAnotacoes").value;

salvarDados();

alert("Anotações salvas!");

}

}

function voltar(){

document.getElementById("listaTela").style.display="block";
document.getElementById("anotacoesTela").style.display="none";

}

renderizar();

</script>

</body>
</html>
