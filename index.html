<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mochila de Victor</title>
  <style>
    body {
      background-color: #1E90FF; /* azul */
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
    }
    #materias {
      list-style-type: none;
      padding: 0;
    }
    #materias li {
      background: rgba(255,255,255,0.2);
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    button {
      margin-left: 10px;
      padding: 5px 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
    .add-btn {
      background-color: #32CD32;
      color: white;
    }
    .del-btn {
      background-color: #FF4500;
      color: white;
    }
  </style>
</head>
<body>
  <h1>Mochila de Victor - Caderno de Anotações</h1>
  
  <input type="text" id="novaMateria" placeholder="Digite a matéria">
  <button class="add-btn" onclick="adicionarMateria()">Adicionar Matéria</button>
  
  <ul id="materias"></ul>
  
  <script>
    function adicionarMateria() {
      const input = document.getElementById('novaMateria');
      const materia = input.value.trim();
      if (materia !== "") {
        const li = document.createElement('li');
        li.textContent = materia;
        
        const btnExcluir = document.createElement('button');
        btnExcluir.textContent = "Excluir";
        btnExcluir.className = "del-btn";
        btnExcluir.onclick = function() {
          li.remove();
        };
        
        li.appendChild(btnExcluir);
        document.getElementById('materias').appendChild(li);
        input.value = "";
      }
    }
  </script>
</body>
</html>
